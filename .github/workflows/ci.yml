name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit:
    name: Unit tests + vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: go mod verify
        run: go mod verify

      - name: go vet
        run: go vet ./...

      - name: gofmt (fails on unformatted code)
        run: |
          diff -u <(echo -n) <(gofmt -d -s .)

      - name: Unit tests (race)
        run: go test -race -count=1 ./...

  integration:
    name: Integration tests (Postgres + PostGIS + h3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Build custom Postgres image (postgis + h3-pg)
        run: docker build -t jacaranda-postgres:ci ./docker/postgres

      - name: Start Postgres container
        run: |
          docker run -d \
            --name jacaranda-postgres-ci \
            -e POSTGRES_USER=jacaranda \
            -e POSTGRES_PASSWORD=jacaranda \
            -e POSTGRES_DB=jacaranda \
            -v "$PWD/docker/postgres/init:/docker-entrypoint-initdb.d:ro" \
            -p 55432:5432 \
            jacaranda-postgres:ci

      - name: Wait for Postgres to be ready
        run: |
          for i in $(seq 1 60); do
            if docker exec jacaranda-postgres-ci pg_isready -U jacaranda -d jacaranda >/dev/null 2>&1; then
              echo "postgres ready"
              exit 0
            fi
            sleep 1
          done
          echo "postgres did not become ready in time" >&2
          docker logs jacaranda-postgres-ci
          exit 1

      - name: Integration tests
        env:
          JP_TEST_ADMIN_DSN: postgres://jacaranda:jacaranda@localhost:55432/postgres?sslmode=disable
        run: go test -race -count=1 -tags=integration ./...

      - name: Postgres logs on failure
        if: failure()
        run: docker logs jacaranda-postgres-ci

  build:
    name: Build binary
    runs-on: ubuntu-latest
    needs: [unit]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Build
        run: |
          mkdir -p bin
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o bin/jacaranda ./cmd/server

      - uses: actions/upload-artifact@v5
        with:
          name: jacaranda-binary
          path: bin/jacaranda
          retention-days: 7
